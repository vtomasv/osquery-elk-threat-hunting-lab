server {
    listen 80;
    server_name evil-downloads.corp;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Simular página de descarga maliciosa
    location / {
        autoindex on;
        add_header X-Served-By "evil-downloads.corp";
    }
    
    # Log de accesos (para detección)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
