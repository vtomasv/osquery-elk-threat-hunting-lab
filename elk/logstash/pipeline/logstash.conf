###############################################################################
# LOGSTASH PIPELINE - THREAT HUNTING LAB
# Procesa logs de Osquery, Syslog, y eventos de seguridad
###############################################################################

input {
  beats {
    port => 5044
    type => "filebeat"
  }

  tcp {
    port => 5045
    codec => json_lines
    type => "osquery-direct"
  }
}

filter {

  if [type] == "filebeat" or [type] == "osquery-direct" {

    if [fields][log_type] == "osquery_result" {
      json {
        source => "message"
        target => "osquery"
        skip_on_invalid_json => true
      }

      mutate {
        add_field => {
          "[@metadata][index]" => "osquery-results"
          "event.module" => "osquery"
        }
      }

      if [osquery][hostIdentifier] {
        mutate {
          add_field => { "endpoint.name" => "%{[osquery][hostIdentifier]}" }
        }
      }

      if [osquery][name] {
        mutate {
          add_field => { "osquery.query_name" => "%{[osquery][name]}" }
        }
      }
    }

    if [fields][log_type] == "osquery_snapshot" {
      json {
        source => "message"
        target => "osquery"
        skip_on_invalid_json => true
      }

      mutate {
        add_field => {
          "[@metadata][index]" => "osquery-snapshots"
        }
      }
    }
  }

  if [fields][log_type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
    }

    mutate {
      add_field => { "[@metadata][index]" => "syslog" }
    }

    if [syslog_message] =~ /Failed password|authentication failure|invalid user/ {
      mutate {
        add_tag => ["auth_failure", "security_event"]
        add_field => { "threat.indicator.type" => "brute_force_attempt" }
      }
    }

    if [syslog_message] =~ /sudo|pkexec|polkit/ {
      mutate {
        add_tag => ["privilege_escalation", "security_event"]
      }
    }
  }

  if [fields][log_type] == "process_audit" {
    json {
      source => "message"
      target => "process"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => { "[@metadata][index]" => "process-events" }
    }

    if [process][cmdline] =~ /wget|curl|ncat|python|bash -i|perl -e|ruby -e/ {
      mutate {
        add_tag => ["suspicious_execution", "security_event"]
        add_field => { "threat.technique.id" => "T1059" }
      }
    }

    if [process][cmdline] =~ /ssh|scp|rsync|psexec|crackmapexec/ {
      mutate {
        add_tag => ["lateral_movement", "security_event"]
        add_field => { "threat.technique.id" => "T1021" }
      }
    }
  }

  if [fields][log_type] == "network_audit" {
    json {
      source => "message"
      target => "network"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => { "[@metadata][index]" => "network-events" }
    }

    if [network][remote_port] == "4444" or [network][remote_port] == "4443" or [network][remote_port] == "8443" {
      mutate {
        add_tag => ["c2_communication", "security_event"]
        add_field => { "threat.technique.id" => "T1071" }
      }
    }
  }

  if [fields][log_type] == "attack_simulation" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }

    # Mapear campos del ataque a los campos que el dashboard espera
    if [event] {
      mutate {
        rename => { "event" => "event_type" }
      }
    }
    if [threat] {
      mutate {
        rename => { "threat" => "technique" }
      }
    }
    if [severity] {
      mutate {
        rename => { "severity" => "risk_level" }
      }
    }
    if ![risk_level] {
      mutate {
        add_field => { "risk_level" => "HIGH" }
      }
    }
    if ![endpoint] {
      if [host][name] {
        mutate {
          rename => { "[host][name]" => "endpoint" }
        }
      }
    }

    mutate {
      add_field => { "[@metadata][index]" => "threat-hunting" }
    }
  }

  if "security_event" in [tags] {
    mutate {
      add_field => {
        "threat.framework" => "MITRE ATT&CK"
        "event.severity" => "high"
      }
    }
  }

  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }
}

output {
  if [@metadata][index] == "osquery-results" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "osquery-results-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "osquery-snapshots" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "osquery-snapshots-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "syslog" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "syslog-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "process-events" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "process-events-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "network-events" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "network-events-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "threat-hunting" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "threat-hunting-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "threat-hunting-%{+YYYY.MM.dd}"
    }
  }
}
