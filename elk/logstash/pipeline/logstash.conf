###############################################################################
# LOGSTASH PIPELINE - THREAT HUNTING LAB
# Procesa logs de Osquery, Syslog, y eventos de seguridad
###############################################################################

input {
  # Filebeat input (osquery results + syslog)
  beats {
    port => 5044
    type => "filebeat"
  }

  # Input directo para eventos de osquery via JSON
  tcp {
    port => 5045
    codec => json_lines
    type => "osquery-direct"
  }
}

filter {
  # =========================================================================
  # PROCESAMIENTO DE LOGS DE OSQUERY
  # =========================================================================
  if [type] == "filebeat" or [type] == "osquery-direct" {
    
    # Parsear logs de osquery results
    if [log_type] == "osquery_result" or [fields][log_type] == "osquery_result" {
      json {
        source => "message"
        target => "osquery"
        skip_on_invalid_json => true
      }
      
      mutate {
        add_field => { 
          "[@metadata][index]" => "osquery-results"
          "event.module" => "osquery"
          "event.dataset" => "osquery.result"
        }
      }

      # Extraer información del endpoint
      if [osquery][hostIdentifier] {
        mutate {
          add_field => { "endpoint.name" => "%{[osquery][hostIdentifier]}" }
        }
      }

      # Clasificar por tipo de query
      if [osquery][name] {
        mutate {
          add_field => { "osquery.query_name" => "%{[osquery][name]}" }
        }
      }

      # Detectar eventos de seguridad críticos
      if [osquery][name] =~ /process_events|socket_events|file_events|user_events/ {
        mutate {
          add_tag => ["security_event"]
        }
      }
    }

    # Parsear logs de osquery snapshots
    if [log_type] == "osquery_snapshot" or [fields][log_type] == "osquery_snapshot" {
      json {
        source => "message"
        target => "osquery"
        skip_on_invalid_json => true
      }
      
      mutate {
        add_field => { 
          "[@metadata][index]" => "osquery-snapshots"
          "event.module" => "osquery"
          "event.dataset" => "osquery.snapshot"
        }
      }
    }
  }

  # =========================================================================
  # PROCESAMIENTO DE SYSLOG / AUTH LOGS
  # =========================================================================
  if [fields][log_type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
    }
    
    mutate {
      add_field => { "[@metadata][index]" => "syslog" }
    }

    # Detectar intentos de autenticación fallidos
    if [syslog_message] =~ /Failed password|authentication failure|invalid user/i {
      mutate {
        add_tag => ["auth_failure", "security_event"]
        add_field => { "threat.indicator.type" => "brute_force_attempt" }
      }
    }

    # Detectar escalación de privilegios
    if [syslog_message] =~ /sudo|su:|pkexec|polkit/i {
      mutate {
        add_tag => ["privilege_escalation", "security_event"]
      }
    }
  }

  # =========================================================================
  # PROCESAMIENTO DE EVENTOS DE PROCESO
  # =========================================================================
  if [fields][log_type] == "process_audit" {
    json {
      source => "message"
      target => "process"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => { "[@metadata][index]" => "process-events" }
    }

    # Detectar ejecución sospechosa
    if [process][cmdline] =~ /wget|curl|nc |ncat|python.*-c|bash.*-i|perl.*-e|ruby.*-e/ {
      mutate {
        add_tag => ["suspicious_execution", "security_event"]
        add_field => { "threat.technique.id" => "T1059" }
      }
    }

    # Detectar movimiento lateral
    if [process][cmdline] =~ /ssh|scp|rsync|psexec|wmic|crackmapexec/ {
      mutate {
        add_tag => ["lateral_movement", "security_event"]
        add_field => { "threat.technique.id" => "T1021" }
      }
    }
  }

  # =========================================================================
  # PROCESAMIENTO DE EVENTOS DE RED
  # =========================================================================
  if [fields][log_type] == "network_audit" {
    json {
      source => "message"
      target => "network"
      skip_on_invalid_json => true
    }

    mutate {
      add_field => { "[@metadata][index]" => "network-events" }
    }

    # Detectar conexiones C2 sospechosas
    if [network][remote_port] == "4444" or [network][remote_port] == "4443" or [network][remote_port] == "8443" {
      mutate {
        add_tag => ["c2_communication", "security_event"]
        add_field => { "threat.technique.id" => "T1071" }
      }
    }
  }

  # =========================================================================
  # ENRIQUECIMIENTO MITRE ATT&CK
  # =========================================================================
  if "security_event" in [tags] {
    mutate {
      add_field => { 
        "threat.framework" => "MITRE ATT&CK"
        "event.severity" => "high"
      }
    }
  }

  # Timestamp processing
  date {
    match => ["timestamp", "ISO8601", "UNIX", "UNIX_MS"]
    target => "@timestamp"
  }
}

output {
  # =========================================================================
  # OUTPUT A ELASTICSEARCH
  # =========================================================================
  if [@metadata][index] == "osquery-results" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "osquery-results-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "osquery-snapshots" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "osquery-snapshots-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "syslog" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "syslog-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "process-events" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "process-events-%{+YYYY.MM.dd}"
    }
  } else if [@metadata][index] == "network-events" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "network-events-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "threat-hunting-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (comentar en producción)
  # stdout { codec => rubydebug }
}
